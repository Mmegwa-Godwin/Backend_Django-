{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Mmegwa Godwin{% endblock %}</title>

    <!-- CSS -->
    <link rel="stylesheet" href="{% static 'projects/style.css' %}">

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Bootstrap Icons -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css" rel="stylesheet">
    <link rel="icon" href="{% static 'projects/favicon.svg' %}" type="image/svg+xml">
</head>
<body>

<!-- Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a class="navbar-brand" href="{% url 'home' %}">
            <i class="bi bi-code-slash"></i> Mmegwa Godwin
        </a>

        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>

        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto align-items-center">
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#projects"><i class="bi bi-kanban"></i> Projects</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#about"><i class="bi bi-person"></i> About</a></li>
                <li class="nav-item"><a class="nav-link" href="{% url 'home' %}#contact"><i class="bi bi-envelope"></i> Contact</a></li>

                {% if user.is_authenticated %}
                <li class="nav-item ms-2">
                    <a href="/admin/" class="btn btn-warning btn-sm">
                        <i class="bi bi-speedometer2"></i> Admin
                    </a>
                </li>
                <li class="nav-item ms-2">
                    <a href="{% url 'logout' %}" class="btn btn-outline-light btn-sm">
                        <i class="bi bi-box-arrow-right"></i> Logout
                    </a>
                </li>
                {% endif %}
            </ul>
        </div>
    </div>
</nav>

<!-- Main Content -->
<main>
    {% block content %}
    {% endblock %}
</main>

<!-- Footer -->
<footer class="py-3 bg-dark text-white text-center mt-5">
    <div class="container">
        <i class="bi bi-c-circle"></i> 2026 Mmegwa Godwin | Charleston Tech. All rights reserved.
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
