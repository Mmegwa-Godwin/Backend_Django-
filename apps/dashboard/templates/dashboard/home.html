<!DOCTYPE html>
<html>
<head>
    <title>SaaS Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="bg-dark text-white p-3" style="width:250px; min-height:100vh;">
        <h4>🚀 SaaS Admin</h4>

        <hr>

        <a href="/dashboard/" class="text-white d-block mb-2">📊 Dashboard</a>
        <a href="/dashboard/create/" class="text-white d-block mb-2">➕ Create Project</a>
        <a href="/admin/" class="text-white d-block mb-2">⚙️ Admin Panel</a>
    </div>

    <!-- Main -->
    <div class="container p-4">

        <h2>Dashboard</h2>

        <div class="row my-3">
            <div class="col-md-4">
                <div class="card p-3">
                    <h5>Total Projects</h5>
                    <h2>{{ projects|length }}</h2>
                </div>
            </div>
        </div>

        <div class="row">
            {% for project in projects %}
            <div class="col-md-4">
                <div class="card p-3 mb-3">

                    <h5>{{ project.title }}</h5>
                    <p>{{ project.description }}</p>

                    <div class="d-flex gap-2">
                        <a href="/dashboard/edit/{{ project.id }}/" class="btn btn-warning btn-sm">Edit</a>
                        <a href="/dashboard/delete/{{ project.id }}/" class="btn btn-danger btn-sm">Delete</a>
                    </div>

                </div>
            </div>
            {% endfor %}
        </div>

    </div>
</div>

</body>
</html>
