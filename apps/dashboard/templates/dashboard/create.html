<!DOCTYPE html>
<html>
<head>
    <title>Create Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <h2>Create Project</h2>

    <form method="POST">
        {% csrf_token %}

        <input name="title" class="form-control mb-2" placeholder="Title">

        <textarea name="description" class="form-control mb-2" placeholder="Description"></textarea>

        <input name="tech_stack" class="form-control mb-2" placeholder="Tech Stack">

        <input name="github_link" class="form-control mb-2" placeholder="GitHub">

        <input name="live_link" class="form-control mb-2" placeholder="Live Link">

        <button class="btn btn-primary">Save</button>
    </form>

</div>

</body>
</html>
