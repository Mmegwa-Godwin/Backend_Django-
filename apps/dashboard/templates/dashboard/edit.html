<!DOCTYPE html>
<html>
<head>
    <title>Edit Project</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<div class="container py-5">

    <h2>✏️ Edit Project</h2>

    <form method="POST">
        {% csrf_token %}

        <input name="title" class="form-control mb-2" value="{{ project.title }}">

        <textarea name="description" class="form-control mb-2">{{ project.description }}</textarea>

        <input name="tech_stack" class="form-control mb-2" value="{{ project.tech_stack }}">

        <input name="github_link" class="form-control mb-2" value="{{ project.github_link }}">

        <input name="live_link" class="form-control mb-2" value="{{ project.live_link }}">

        <button class="btn btn-primary">Update</button>
    </form>

</div>

</body>
</html>
