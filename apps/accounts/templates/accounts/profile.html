{% extends 'base.html' %}
{% block title %}My Profile{% endblock %}
{% block content %}
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="card shadow-sm">
                <div class="card-header bg-primary text-white">
                    <h4 class="mb-0"><i class="bi bi-person-circle"></i> {{ user.username }}'s Profile</h4>
                </div>
                <div class="card-body">
                    {% if user.profile.avatar_url %}
                    <div class="text-center mb-3">
                        <img src="{{ user.profile.avatar_url.url }}" class="rounded-circle" width="100" height="100" style="object-fit: cover;">
                    </div>
                    {% endif %}
                    <form method="post" >
                        {% csrf_token %}
                        {{ form.as_p }}
                        <button type="submit" class="btn btn-primary">Update Profile</button>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
